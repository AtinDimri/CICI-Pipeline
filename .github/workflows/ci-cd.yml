name: CI-CD-Pipeline

on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Execute 6 Test Cases
        run: |
          python -m pytest test_app.py

  deploy-and-rollback:
    needs: run-tests
    runs-on: ubuntu-latest
    # This job runs even if the previous testing job fails
    if: always()
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Simulate Rollback
        # This step only executes if the test job failed
        if: ${{ needs.run-tests.result == 'failure' }}
        run: |
          echo "⚠️ Tests failed! Initiating automatic rollback procedure..."
          echo "🔄 Rolling back to the last known stable version..."